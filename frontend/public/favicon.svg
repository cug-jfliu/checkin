<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Calendar background -->
  <rect x="2" y="5" width="28" height="25" rx="3" fill="#4f46e5"/>
  <!-- Calendar top bar -->
  <rect x="2" y="5" width="28" height="9" rx="3" fill="#6366f1"/>
  <rect x="2" y="11" width="28" height="3" fill="#6366f1"/>
  <!-- Calendar rings -->
  <rect x="9" y="2" width="3" height="7" rx="1.5" fill="#c7d2fe"/>
  <rect x="20" y="2" width="3" height="7" rx="1.5" fill="#c7d2fe"/>
  <!-- Checkmark -->
  <polyline points="9,18 14,23 23,13" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
